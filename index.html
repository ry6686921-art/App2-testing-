<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Agniveer Vayu – Ultimate CBT</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/contrib/auto-render.min.js" onload="renderMath()"></script>
<style>
/* EXACT SAME UI AS PROVIDED */
:root{ --primary:#0a3d62;--secondary:#576574;--success:#10ac84; --danger:#ee5253;--purple:#5f27cd;--bg:#f1f2f6;}
body { font-family:sans-serif; background:var(--bg); margin:0; user-select: none; }
.hidden{display:none}.center{text-align:center}
.watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 6vw; color: rgba(0,0,0,0.05); font-weight: 900; pointer-events: none; z-index: 9999; }
.card{background:#fff;padding:30px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,0.08);margin-bottom:20px}
button{padding:12px 18px;border:none;border-radius:6px;cursor:pointer;background:var(--primary);color:#fff;font-weight:600;margin:5px}
input,select{padding:14px;margin:10px 0;width:100%;border-radius:6px;border:1px solid #ccc}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;border:1px solid #ddd}
</style>
</head>
<body oncontextmenu="return false">

<div class="watermark" id="brandMark">ROHIT SIR</div>

<div id="login" class="card center" style="max-width:420px;margin:60px auto">
  <h2>Candidate Login</h2>
  <p>Select Mock Test:</p>
  <select id="examSelect"></select>
  <input id="sname" placeholder="👤 Full Name">
  <input id="sphone" placeholder="📱 Phone Number">
  <button class="success" style="width:100%" onclick="startExam()">Start Examination</button>
  <button class="purple" style="width:100%" onclick="showLeaderboard()">🏆 Live Rankings</button>
</div>

<div id="leaderboard" class="card hidden center" style="max-width:600px; margin:40px auto">
  <h2>🏆 Live Global Rankings</h2>
  <div id="rankContent"></div>
  <button onclick="show('login')">Back to Login</button>
</div>

<div id="exam" class="hidden">
  <div class="card center"><div id="qContainer"></div><button onclick="submit()">Submit</button></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJReAy37laOTfj8T29c9zbSYRk3quZ1K7XtMqyEqC3e-4oL4InVqIGRB18Kcw8zjrl4A/exec";
let questions = [], students = [], activeExam = "";

window.onload = async () => {
  const fRes = await fetch(SCRIPT_URL + "?action=getExamList");
  const folders = await fRes.json();
  examSelect.innerHTML = folders.map(f => `<option value="${f}">${f}</option>`).join("");
  const sRes = await fetch(SCRIPT_URL + "?action=getStudents");
  students = await sRes.json();
};

async function startExam(){
  activeExam = examSelect.value;
  const qRes = await fetch(SCRIPT_URL + "?action=getQuestions&exam=" + activeExam);
  questions = await qRes.json();
  
  let u = students.find(s=>s.name.toLowerCase()==sname.value.toLowerCase().trim() && s.phone==sphone.value.trim());
  if(!u) return alert("Not registered");

  brandMark.innerHTML = `ROHIT SIR<br><span style="font-size:2vw">${u.phone}</span>`;
  show('exam');
  // Load first question and timer here...
}

async function showLeaderboard(){
  show('leaderboard');
  const r = await fetch(SCRIPT_URL + "?action=getLeaderboard");
  const data = await r.json();
  rankContent.innerHTML = `<table><tr><th>Rank</th><th>Name</th><th>Score</th></tr>
    ${data.slice(0,10).map(u => `<tr><td>${u.rank}</td><td>${u.name}</td><td>${u.score}</td></tr>`).join("")}</table>`;
}

function show(id){
  document.querySelectorAll('body > div:not(.watermark)').forEach(d=>d.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function renderMath(){
  if(window.renderMathInElement) renderMathInElement(document.body,{delimiters:[{left:"$$",right:"$$",display:true}]});
}
</script>
</body>
</html>
